<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>作文侦探社 · 三大谜案</title>
<style>
  :root{
    --teal1:#0e2a33; --teal2:#16323d; --cream:#fbf3e2; --cream2:#f3e6c4;
    --ink:#2c2018; --ink2:#5a4634; --brass:#c79a3b; --brass-d:#a87f28;
    --u1:#e0843c; --u4:#6f7fd6; --u5:#cf5a7e;
    --ok:#3fa66a; --bad:#d9534f; --shadow:0 8px 22px rgba(0,0,0,.28);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{
    font-family:"PingFang SC","Microsoft YaHei","微软雅黑",system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 600px at 50% -10%, #1d4250 0%, transparent 60%),
      linear-gradient(160deg, var(--teal1), var(--teal2));
    min-height:100%;
    -webkit-tap-highlight-color:transparent;
  }
  .kai{font-family:"STKaiti","KaiTi","楷体",serif;}
  header{
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding:10px 16px;border-bottom:2px solid rgba(199,154,59,.45);
    background:rgba(7,22,28,.55);backdrop-filter:blur(4px);
    position:sticky;top:0;z-index:20;
  }
  header .ttl{font-family:"STKaiti","KaiTi",serif;color:var(--brass);font-size:20px;font-weight:700;letter-spacing:1px}
  header .ttl small{color:#cfe0e0;font-family:inherit;font-weight:400;font-size:12px;margin-left:8px;opacity:.75}
  .iconbtn{
    border:1px solid rgba(199,154,59,.5);background:rgba(255,255,255,.06);color:#f3e6c4;
    width:38px;height:34px;border-radius:9px;cursor:pointer;font-size:16px;line-height:1;
    display:inline-flex;align-items:center;justify-content:center;transition:.15s;
  }
  .iconbtn:hover{background:rgba(199,154,59,.25)}
  main#screen{max-width:920px;margin:0 auto;padding:18px 16px 70px}
  .center{text-align:center}
  h1{font-family:"STKaiti","KaiTi",serif;color:var(--cream);font-size:28px;margin:6px 0}
  .sub{color:#bcd2d2;font-size:15px;line-height:1.7;max-width:600px;margin:0 auto}
  .panel{background:linear-gradient(180deg,#fffaf0,var(--cream));border:2px solid var(--brass);
    border-radius:18px;box-shadow:var(--shadow);padding:18px;}
  .btn{
    font-family:inherit;border:none;cursor:pointer;border-radius:14px;font-weight:700;
    padding:13px 26px;font-size:17px;color:#3a2a10;
    background:linear-gradient(180deg,#f0cf73,#c79a3b);
    box-shadow:0 4px 0 #8a661c, 0 8px 16px rgba(0,0,0,.25);transition:.08s;letter-spacing:.5px;
  }
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 #8a661c}
  .btn.ghost{background:rgba(255,255,255,.1);color:#f3e6c4;border:1px solid rgba(199,154,59,.6);box-shadow:none;font-weight:600}
  .btn.sm{padding:9px 16px;font-size:14px;border-radius:11px}
  .btn.dark{background:linear-gradient(180deg,#3a6b54,#2c5a45);color:#eafff2;box-shadow:0 4px 0 #1d3e2f,0 8px 16px rgba(0,0,0,.25)}
  .btn.dark:active{box-shadow:0 1px 0 #1d3e2f}
  .btn:disabled{filter:grayscale(.7) brightness(.95);opacity:.55;cursor:not-allowed}
  .row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;align-items:center}
  .ava{display:block}
  .sk{fill:#ffd9b8;stroke:#c98a5e;stroke-width:1.4}
  .ey{fill:#3a2a22}
  .mo{fill:none;stroke:#a85a3a;stroke-width:2;stroke-linecap:round}
  .bl{fill:#ff9a86;opacity:.55}
  .hr{fill:#3a2a22}
  .ol{stroke:#4a3b2a;stroke-width:2;stroke-linejoin:round;stroke-linecap:round}
  .badge{display:inline-block;color:#fff;border-radius:20px;padding:2px 12px;font-size:12.5px;font-weight:700}

  /* ---------- 侦探社大厅 / 案件卡 ---------- */
  .cases{display:grid;grid-template-columns:1fr;gap:14px;margin-top:16px}
  .casecard{display:flex;align-items:center;gap:16px;cursor:pointer;text-align:left;border-radius:16px;
    padding:15px 16px;border:2px solid var(--brass);background:linear-gradient(180deg,#fffaf0,var(--cream));
    box-shadow:var(--shadow);transition:.12s;position:relative;overflow:hidden}
  .casecard:hover{transform:translateY(-2px)}
  .casecard .no{width:54px;height:54px;flex:0 0 auto;border-radius:14px;display:grid;place-items:center;
    color:#fff;box-shadow:inset 0 -3px 0 rgba(0,0,0,.15)}
  .casecard h3{margin:0 0 3px;font-size:20px;font-family:"STKaiti","KaiTi",serif}
  .casecard .topic{color:var(--ink);font-weight:700;font-size:15px;margin:0 0 2px}
  .casecard p{margin:0;color:var(--ink2);font-size:13px}
  .casecard .state{margin-left:auto;font-size:13px;text-align:center;color:var(--ink2)}
  .casecard .state .big{font-size:24px;display:block}
  .casecard .stripe{position:absolute;left:0;top:0;bottom:0;width:7px}

  /* ---------- 关卡进度条（房间） ---------- */
  .rooms{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:10px 0 4px}
  .rm{font-size:12px;color:#bcd2d2;border:1px solid rgba(199,154,59,.4);border-radius:20px;padding:3px 11px;background:rgba(255,255,255,.05)}
  .rm.cur{background:var(--brass);color:#2a1d08;border-color:var(--brass);font-weight:700}
  .rm.done{color:#9fe7bd;border-color:rgba(63,166,106,.6)}

  /* ---------- 题眼 chips ---------- */
  .wchips{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;margin:14px 0}
  .wc{font-family:"STKaiti","KaiTi",serif;font-size:21px;font-weight:700;padding:9px 15px;border-radius:12px;
    border:2px dashed var(--brass);background:#fff;cursor:pointer;transition:.12s;color:var(--ink)}
  .wc:hover{transform:translateY(-2px)}
  .wc.hit{background:#fff2c8;border-style:solid;border-color:var(--ok);color:#2f7d4f;box-shadow:0 0 0 3px rgba(63,166,106,.18)}
  .wc.miss{animation:shake .4s}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

  /* ---------- 选项卡（选事/情绪/特点） ---------- */
  .picks{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}
  @media(max-width:560px){.picks{grid-template-columns:1fr}}
  .pick{font-family:inherit;font-size:15px;font-weight:600;text-align:left;padding:13px 14px;border-radius:13px;
    border:2px solid var(--brass);background:linear-gradient(180deg,#fffaf0,var(--cream));cursor:pointer;transition:.1s;color:var(--ink);line-height:1.5}
  .pick:hover{transform:translateY(-2px)}
  .pick.sel{outline:4px solid var(--u4);outline-offset:1px;background:#eef0ff}
  .pick b{color:var(--brass-d)}

  /* ---------- 金句库 ---------- */
  .scat{margin-top:14px}
  .scat h4{font-family:"STKaiti","KaiTi",serif;font-size:16px;margin:0 0 8px;color:var(--brass-d);display:flex;align-items:center;gap:6px}
  .sent{display:block;width:100%;text-align:left;font-size:14.5px;line-height:1.6;padding:11px 13px;border-radius:12px;
    border:1.5px solid #e6d3a4;background:#fffdf6;cursor:pointer;transition:.1s;color:var(--ink);margin-bottom:8px;position:relative}
  .sent:hover{border-color:var(--brass)}
  .sent.on{background:#e7f6ec;border-color:var(--ok);box-shadow:inset 0 0 0 1px var(--ok)}
  .sent .tick{position:absolute;right:9px;top:9px;color:var(--ok);font-weight:800;opacity:0;transition:.15s}
  .sent.on .tick{opacity:1}

  /* ---------- 创作室 ---------- */
  .field{margin-bottom:13px}
  .field label{display:block;font-weight:700;color:var(--ink);font-size:14.5px;margin-bottom:5px}
  .field label .tip{font-weight:400;color:var(--ink2);font-size:12.5px}
  .field textarea{width:100%;font-family:inherit;font-size:15px;line-height:1.6;color:var(--ink);
    border:1.5px solid #e0cb98;border-radius:11px;padding:10px 12px;background:#fffdf6;resize:vertical;min-height:48px;outline:none}
  .field textarea:focus{border-color:var(--brass)}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 12px}
  .jchip{font-size:12.5px;border:1px solid var(--brass);background:#fff7e3;color:var(--brass-d);border-radius:20px;padding:4px 11px;cursor:pointer;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .jchip:hover{background:#ffe9b8}
  .jbank{display:flex;flex-direction:column;gap:7px;margin:4px 0 14px}
  .jrow{display:flex;gap:9px;align-items:center;background:#fff7e3;border:1px solid #e6d3a4;border-radius:11px;padding:7px 10px}
  .jrow span{font-size:13.5px;line-height:1.55;color:var(--ink)}
  .jins{flex:0 0 auto;border:none;background:var(--brass);color:#fff;width:28px;height:28px;border-radius:9px;cursor:pointer;font-weight:800;font-size:18px;line-height:1;display:grid;place-items:center}
  .jins:hover{background:var(--brass-d)} .jins:active{transform:scale(.92)}
  .draftbox{width:100%;font-family:"STKaiti","KaiTi",serif;font-size:16px;line-height:1.9;color:var(--ink);
    border:2px solid var(--brass);border-radius:13px;padding:14px 15px;background:#fffdf6;resize:vertical;min-height:220px;outline:none}
  .draftbox:focus{border-color:var(--brass-d)}
  .meta{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--ink2);margin-top:6px;flex-wrap:wrap;gap:8px}

  /* ---------- 卡片/笔记 ---------- */
  .note{background:#fff7e3;border:1px dashed var(--brass);border-radius:12px;padding:12px 14px;
    text-align:left;font-size:14px;line-height:1.75;color:var(--ink);margin-top:10px}
  .note b{color:var(--brass-d)}
  .steps{counter-reset:s;margin:10px 0 0;padding:0;list-style:none}
  .steps li{position:relative;padding:8px 8px 8px 38px;margin-bottom:8px;background:#fffdf6;border:1.5px solid #e6d3a4;border-radius:11px;font-size:14px;line-height:1.6}
  .steps li::before{counter-increment:s;content:counter(s);position:absolute;left:9px;top:8px;width:22px;height:22px;border-radius:50%;background:var(--brass);color:#fff;display:grid;place-items:center;font-weight:800;font-size:13px}

  /* ---------- 弹窗 ---------- */
  #modal{position:fixed;inset:0;background:rgba(5,15,20,.62);display:grid;place-items:center;z-index:40;padding:18px}
  #modal.hidden{display:none}
  .card{max-width:460px;width:100%;border-radius:20px;border:3px solid var(--brass);
    background:linear-gradient(180deg,#fffaf0,var(--cream));box-shadow:0 16px 40px rgba(0,0,0,.45);
    padding:20px;text-align:center;animation:pop .22s ease;max-height:88vh;overflow:auto}
  @keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}

  /* ---------- 作品集 ---------- */
  .glist{display:grid;grid-template-columns:1fr;gap:11px;margin-top:14px}
  .gitem{border:2px solid var(--brass);border-radius:14px;background:linear-gradient(180deg,#fffaf0,var(--cream));
    box-shadow:var(--shadow);padding:13px 15px;text-align:left;cursor:pointer;transition:.1s;display:flex;gap:12px;align-items:center}
  .gitem:hover{transform:translateY(-2px)}
  .gitem .gno{width:42px;height:42px;border-radius:10px;flex:0 0 auto;display:grid;place-items:center;color:#fff;font-weight:800}
  .gitem h4{margin:0 0 2px;font-size:15px}
  .gitem p{margin:0;font-size:12.5px;color:var(--ink2)}
  .scoretag{margin-left:auto;font-family:"STKaiti","KaiTi",serif;font-weight:800;font-size:15px;color:var(--brass-d);text-align:center;flex:0 0 auto}
  .scoretag small{display:block;font-size:10px;color:var(--ink2);font-weight:400}

  /* ---------- 证书 ---------- */
  #cert{background:
      repeating-linear-gradient(45deg,rgba(199,154,59,.06) 0 12px,transparent 12px 24px),
      linear-gradient(180deg,#fffdf5,#f7eccf);
    border:6px double var(--brass);border-radius:14px;padding:26px 22px;max-width:560px;margin:14px auto;text-align:center;box-shadow:var(--shadow)}
  #cert .seal{font-family:"STKaiti","KaiTi",serif;color:var(--brass-d);font-size:15px;letter-spacing:6px}
  #cert h2{font-family:"STKaiti","KaiTi",serif;font-size:30px;margin:8px 0 4px;color:var(--ink)}
  #cert .name{font-family:"STKaiti","KaiTi",serif;font-size:38px;color:var(--bad);margin:8px 0;font-weight:800}
  #cert .body{font-size:15.5px;line-height:1.9;color:var(--ink2)}
  #cert .tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:12px 0}
  #cert .tags span{font-family:"STKaiti","KaiTi",serif;background:#fff;border:1px solid var(--brass);border-radius:20px;padding:3px 11px;font-size:13px;color:var(--ink)}
  #cert .stamp{display:inline-grid;place-items:center;width:84px;height:84px;border-radius:50%;
    border:3px solid var(--bad);color:var(--bad);font-family:"STKaiti","KaiTi",serif;font-weight:800;
    transform:rotate(-12deg);font-size:14px;line-height:1.2;margin-top:8px;opacity:.9}

  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:rgba(20,12,4,.92);color:#ffe9b0;padding:11px 18px;border-radius:12px;font-size:15px;
    border:1px solid var(--brass);box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.25s;z-index:50;max-width:88%;text-align:center}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:45}
  .hidden{display:none}
  .bar{height:10px;border-radius:8px;background:rgba(0,0,0,.12);overflow:hidden;margin:14px auto 2px;max-width:420px}
  .bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,#f0cf73,#c79a3b);transition:.5s}
  .hint{color:#bcd2d2;font-size:13px;margin-top:8px}
  .stat{color:#cfe0e0;font-size:14px;text-align:center;margin-top:6px}
  footer{color:#7fa0a0;font-size:12px;text-align:center;padding:18px 12px;line-height:1.6}
  @media print{
    body *{visibility:hidden!important}
    #cert,#cert *{visibility:visible!important}
    #cert{position:absolute;left:0;top:0;border-color:#a87f28;box-shadow:none}
  }
</style>
</head>
<body>
  <header>
    <div class="ttl">作文侦探社<small>三大谜案</small></div>
    <div class="row" style="gap:8px">
      <button class="iconbtn" id="btnSound" title="声音开关">🔊</button>
      <button class="iconbtn" id="btnGallery" title="作品集">📁</button>
      <button class="iconbtn" id="btnHome" title="回到侦探社大厅">🏠</button>
    </div>
  </header>

  <main id="screen"></main>
  <div id="modal" class="hidden"></div>
  <div id="toast"></div>
  <canvas id="confetti" class="hidden"></canvas>
  <footer>给家长：这是给五年级孩子练作文的"密室解密"游戏，覆盖第1、4、5单元三类作文。孩子闯五个房间——审题→提纲→金句→创作→结案，最后写出自己的初稿。<br>初稿可一键复制/下载，交给"侦探长"（爸爸的 Claude Code）按"只扣3分"的高标准批改、给范文。详见同文件夹《给爸爸·作文批改怎么用》。</footer>

<script>
/* ===================== 数据：三大谜案（第1/4/5单元） ===================== */
const UNITS = [
  /* ---------------- 第1单元 ---------------- */
  {
    id:'u1', no:1, color:'var(--u1)', accent:'#e0843c',
    caseTitle:'时光胶囊之谜', topic:'那一刻，我长大了', type:'写事 · 成长', badge:'成长侦探',
    fromText:'对应课文：《祖父的园子》抓细节、《梅花魂》借事抒情；官方例文《那一刻，我长大了》《我能照顾妈妈，我长大了》',
    goal:'写一件成长中印象最深的事：把经过写清楚，把感到"长大"的"那一刻"写具体（所见所闻所思），写出真情实感。',
    example:{title:'那一刻，我长大了（保护鸡蛋）', note:'开头点题"成长只在一刹那"；中间把"保护鸡蛋"这件事的经过写清楚、感受写真实；结尾照应开头、点出"长大"。',
      text:'　　"长大"这个字眼，相信我们都不陌生。有人认为成长是一个漫长的过程，而我却认为，成长有时只在一刹那间。\n　　接近小学毕业的一天下午，语文老师布置了一项奇怪的作业：明天每人带一个鸡蛋，保护它三天。\n　　第二天，同学们都小心地护着自己的鸡蛋，有的用盒子装着，有的用软纸包着，还有的一直握在手里。大家不敢跑，不敢碰，连说话都轻声细语。不断有同学发出惊叫——又一个鸡蛋落地了！我赶紧摸了摸我的，还好，没碎。平时一下课就疯跑的我，只好老老实实地待着。\n　　到了第三天，老师统计结果，竟没有一个成功的，包括我的。老师这才告诉我们用意：父母每天不也是这样"心惊肉跳"地看着我们长大吗？我们就像这一个个鸡蛋，每天在父母小心翼翼的呵护下成长。\n　　也就是在那一刻，我知道，自己已经长大了……'},
    riddle:'尘封的时光胶囊里，藏着你"忽然长大"的那一秒。找齐题眼，才能打开它。',
    keyEye:['那一刻','长大'],
    eyePool:['那一刻','长大','一件小事','长高个子','考试','放学'],
    steps:[
      '起因：选一件让你忽然觉得"长大了"的事（第一次独立做事、懂得父母不易、主动担起责任）。',
      '经过：把"那一刻"放慢成慢镜头——先做什么、再做什么，动作写细。',
      '心里：那一秒你心里在想什么、什么感受，一定要写出来。',
      '结果+感悟：结尾自然点出"我长大了"，写真心话，不喊口号。'
    ],
    pickTitle:'选一件"那一刻"的成长事（也可点"自己想"）',
    picks:[
      {k:'第一次独立做一件事',d:'第一次自己做饭/自己回家/自己上台……'},
      {k:'懂得了父母的不容易',d:'看见妈妈的白发、爸爸疲惫的背影，心里一酸'},
      {k:'主动担起了责任',d:'家里有事，我主动顶上、照顾家人'},
      {k:'一次失败后没有放弃',d:'摔倒、考砸、被批评后，我自己站了起来'},
      {k:'自己想（写下面）',d:'你也可以写一件别的让你长大的事'}
    ],
    bank:{
      '开头 · 点题入场':[
        '成长，不是一夜之间长高了个子，而是某一个瞬间，心里忽然亮了一下。',
        '那一天很普通，普通得像随手翻过的一页日历，可正是那一刻，我忽然长大了。',
        '时间像一条悄悄流淌的小河，而有那么一刻，河水漫过了我的心。'
      ],
      '比喻 · 让画面发光':[
        '阳光透过窗子洒在桌上，碎成一地金子。',
        '我的心怦怦直跳，像揣了一只乱蹦的小兔子。',
        '妈妈的白发在灯下闪着光，像悄悄落了一层细细的霜。'
      ],
      '动作 · 把那一刻放慢（慢镜头）':[
        '我深吸一口气，握紧了拳头，一步、一步，慢慢朝前走去。',
        '我蹲下身，轻轻接过妈妈手里的菜篮——那一刻，篮子比我想的要沉得多。',
        '我的手停在半空，犹豫了一下，最后还是稳稳地伸了过去。'
      ],
      '心理 · 那一秒在想什么':[
        '那一瞬间，我的脑子里像放电影，闪过妈妈每天早起的背影。',
        '我忽然明白：原来长大，就是开始替别人着想。',
        '一股从没有过的勇气，从我心底一点点升了起来。'
      ],
      '结尾 · 点出成长':[

const KEY='zw_detective_v1';
let state = load();
function defState(){
  return { name:'美美', sound:true,
    cases:{}, gallery:[] };
}
function load(){
  try{ const s = Object.assign(defState(), JSON.parse(localStorage.getItem(KEY)||'{}'));
    s.cases = s.cases||{}; s.gallery = s.gallery||[]; return s;
  }catch(e){ return defState(); }
}
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} }
function cstate(id){
  if(!state.cases[id]) state.cases[id] = {eye:false, choice:'', sentences:[], fields:{}, draft:'', maxRoom:0, submitted:false};
  const c = state.cases[id];
  c.fields = c.fields||{}; c.sentences = c.sentences||[];
  return c;
}

/* ===================== 声音 ===================== */
let actx=null;
function tone(freq,dur,type='sine',vol=.2,delay=0){
  if(!state.sound) return;
  try{
    actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    const t0 = actx.currentTime + delay;
    const o=actx.createOscillator(), g=actx.createGain();
    o.type=type; o.frequency.value=freq; o.connect(g); g.connect(actx.destination);
    g.gain.setValueAtTime(vol,t0); g.gain.exponentialRampToValueAtTime(.0008,t0+dur);
    o.start(t0); o.stop(t0+dur);
  }catch(e){}
}
const sfx={
  click(){tone(430,.05,'square',.1)},
  good(){tone(660,.12,'sine',.2);tone(880,.16,'sine',.2,.09)},
  bad(){tone(190,.22,'sawtooth',.14)},
  unlock(){tone(520,.09,'sine',.2);tone(700,.1,'sine',.2,.09);tone(940,.2,'sine',.22,.19)},
  win(){[523,659,784,1047,1319].forEach((f,i)=>tone(f,.28,'triangle',.2,i*.13))}
};
function speak(text){
  try{
    if(!state.sound || !('speechSynthesis' in window)) return false;
    const u=new SpeechSynthesisUtterance(text); u.lang='zh-CN'; u.rate=.9; u.pitch=1.04;
    const vs=speechSynthesis.getVoices(); const zh=vs.find(v=>/zh|chinese|中文|普通话/i.test(v.lang+' '+v.name));
    if(zh) u.voice=zh;
    speechSynthesis.cancel(); speechSynthesis.speak(u); return true;
  }catch(e){ return false; }
}
if('speechSynthesis' in window){ speechSynthesis.onvoiceschanged=()=>{}; speechSynthesis.getVoices(); }

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function toast(msg,ms=2400){const t=$('#toast');t.innerHTML=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),ms);}
function today(){const d=new Date();const p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;}
function nowStamp(){const d=new Date();const p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}`;}
function cnLen(s){ return (s||'').replace(/\s/g,'').length; }
function modalClose(){ $('#modal').className='hidden'; $('#modal').innerHTML=''; }

const ROOM_NAMES=['例文研习室','审题室','提纲室','金句库','创作室','结案厅'];

  const bar=`<div class="rooms">${ROOM_NAMES.map((r,i)=>`<span class="rm ${i===CUR_ROOM?'cur':(i<CUR_ROOM?'done':'')}">${i+1}.${r}</span>`).join('')}</div>`;

     <span class="badge" style="background:${u.color}">第${u.no}单元 · ${u.type}</span>

     <div style="color:#bcd2d2;font-size:13px;margin-top:2px">题目：《${esc(u.topic)}》${(EXAMPLES[u.id]&&CUR_ROOM!==0)?` &nbsp;<button class="btn ghost sm" id="exBtn" style="padding:5px 12px;font-size:12.5px">📖 回例文研习室</button>`:''}</div>

  sfx.click(); const m=$('#modal'); m.className='';
  m.innerHTML=`<div class="card" style="text-align:left;max-width:580px">
     <div class="center"><span class="badge" style="background:${u.color}">满分例文 · 第${u.no}单元</span>

     <div class="note" style="margin-top:10px"><b>📐 它的提纲（怎么搭架子）：</b><br>${esc(e.frame)}</div>

     <div class="row" style="margin-top:14px">

     </div>

  $('#stOk').onclick=()=>{ sfx.good(); modalClose(); if(onRead)onRead(); };

function gotoRoom(n){ CUR_ROOM=n; const c=cstate(CUR_UNIT); c.maxRoom=Math.max(c.maxRoom,n); save(); window.scrollTo(0,0); renderRoom(); }
function navBtns(u,backN,nextN,nextOk,nextLabel){
  return `<div class="row" style="margin-top:18px">
     ${backN===null?`<button class="btn ghost sm" data-go="lobby">⬅ 返回案件板</button>`
       :`<button class="btn ghost sm" id="navBack">⬅ 上一步</button>`}
     ${nextN!==null?`<button class="btn" id="navNext" ${nextOk?'':'disabled'}>${nextLabel||'下一步 ▶'}</button>`:''}
   </div>`;
}
function wireNav(backN,nextN,onNext){
  if($('#navBack')) $('#navBack').onclick=()=>{sfx.click();gotoRoom(backN);};
  if($('#navNext')) $('#navNext').onclick=()=>{ if(onNext&&onNext()===false)return; sfx.good(); gotoRoom(nextN); };
}

/* ---- 房间1：审题室 ---- */
function renderAudit(u,c,head){
  let chips;
  if(u.emotionPick){
    // 第4单元：审题 = 看题目说明，无圈词，直接进提纲选情绪
    screen.innerHTML=`${head}
     <div class="panel">
       <p class="sub" style="color:var(--ink2)">🔐 ${esc(u.riddle)}</p>
       <div class="note">📓 <b>题目：</b>《${u.topic}》<br><b>这类作文要做到：</b>${esc(u.goal)}<br><span style="color:var(--ink2)">${esc(u.fromText)}</span></div>
       <div class="note" style="background:#eef0ff;border-color:#9aa6e6">🔎 <b>题眼：</b>题目里的"<b>他</b>"和那个"<b>＿＿了</b>"（情绪）就是题眼——
       全文都要紧紧围绕"他"的这种情绪来写，而且<b>不能直接说出来</b>，要靠描写"演"出来。</div>
       ${navBtns(u,0,2,true,'锁定情绪 ▶')}
     </div>`;
    speak('审题室。题目是，他，怎么了。要靠动作、语言、神态，把他的情绪演出来。');
    wireNav(0,2);
    return;
  }
  // 第1/5单元：圈题眼解锁
  const pool = (u.eyePool&&u.eyePool.length)?u.eyePool:u.keyEye.slice();
  const found = new Set(c._eyeFound||[]);
  screen.innerHTML=`${head}
   <div class="panel">
     <p class="sub" style="color:var(--ink2)">🔐 ${esc(u.riddle)}</p>
     <div class="note">📓 <b>题目：</b>《${u.topic}》<br><b>这类作文要做到：</b>${esc(u.goal)}<br><span style="color:var(--ink2)">${esc(u.fromText)}</span></div>
     <p class="center" style="margin:14px 0 2px;font-weight:700;color:var(--ink)">👇 点出题目里最关键的"题眼"（共 ${u.keyEye.length} 个）</p>
     <div class="wchips" id="wchips">
       ${pool.map((w,i)=>`<button class="wc ${found.has(w)?'hit':''}" data-w="${esc(w)}">${esc(w)}</button>`).join('')}
     </div>
     <p class="center hint" id="eyeStat" style="color:var(--ink2)"></p>
     ${navBtns(u,0,2,found.size>=u.keyEye.length,'进入提纲室 ▶')}
   </div>`;
  function refresh(){
    $('#eyeStat').textContent = `已找到 ${found.size} / ${u.keyEye.length} 个题眼`;
    if($('#navNext')) $('#navNext').disabled = found.size<u.keyEye.length;
  }
  refresh();
  screen.querySelectorAll('.wc').forEach(b=>b.onclick=()=>{
    const w=b.dataset.w;
    if(found.has(w))return;
    if(u.keyEye.includes(w)){
      sfx.good(); found.add(w); b.classList.add('hit'); c._eyeFound=[...found]; save();
      toast(`✔ 找到题眼「${w}」！`,1600);
      if(found.size>=u.keyEye.length){ sfx.unlock(); c.eye=true; save(); toast('🔓 题眼齐了，提纲室大门打开！'); }
      refresh();
    }else{
      sfx.bad(); b.classList.add('miss'); setTimeout(()=>b.classList.remove('miss'),420);
      toast('这个不是题眼哦，再找找最关键的词～');
    }
  });
  speak(`审题室。题目是，${u.topic}。先找出最关键的题眼。`);
  wireNav(0,2,()=> found.size>=u.keyEye.length );
}

  screen.innerHTML=`${head}
   <div class="panel">
     <h4 style="font-family:'STKaiti',serif;color:var(--brass-d);margin:0 0 4px">🗺️ 破案路线（写作框架）</h4>
     <ol class="steps">${u.steps.map(s=>`<li>${esc(s)}</li>`).join('')}</ol>
     <h4 style="font-family:'STKaiti',serif;color:var(--brass-d);margin:16px 0 2px">🎯 ${esc(u.pickTitle)}</h4>
     <div class="picks" id="picks">
       ${u.picks.map(p=>`<button class="pick ${c.choice===p.k?'sel':''}" data-k="${esc(p.k)}">
          <b>${esc(p.k)}</b><br><span style="font-size:13px;color:var(--ink2)">${esc(p.d)}</span></button>`).join('')}
     </div>
     <div id="customWrap" class="${(/自己想/.test(c.choice))?'':'hidden'}" style="margin-top:10px">
       <input id="customIn" placeholder="写下你要写的人 / 事 / 特点…" value="${esc(c.choiceCustom||'')}"
         style="width:100%;font-family:inherit;font-size:15px;border:1.5px solid var(--brass);border-radius:11px;padding:10px 12px;background:#fffdf6;outline:none">
     </div>
     ${navBtns(u,1,3,!!c.choice,'前往金句库 ▶')}
   </div>`;
  function refresh(){ if($('#navNext')) $('#navNext').disabled = !c.choice; }
  screen.querySelectorAll('.pick').forEach(b=>b.onclick=()=>{
    sfx.click(); c.choice=b.dataset.k; save();
    screen.querySelectorAll('.pick').forEach(x=>x.classList.toggle('sel',x===b));
    $('#customWrap').classList.toggle('hidden', !/自己想/.test(c.choice));
    refresh();
  });
  if($('#customIn')) $('#customIn').oninput=e=>{ c.choiceCustom=e.target.value; save(); };
  refresh();
  speak('提纲室。先看破案路线，再选一个你要写的方向。');
  wireNav(1,3,()=>!!c.choice);
}

/* ---- 房间3：金句库 ---- */
function renderBank(u,c,head){
  const need=3;
  const cats=Object.entries(u.bank);
  screen.innerHTML=`${head}
   <div class="center"><p class="sub" style="color:#bcd2d2">🗝️ 这是"金句武器库"——例文里那些好句的<b>同款</b>，按写作武器分好类了。
   点亮你喜欢的<b>装备</b>起来（至少 ${need} 句），写作文时一点就能"插入"。</p>
   <p class="stat" id="sCount"></p></div>
   <div class="panel" style="margin-top:12px">
     ${cats.map(([cat,arr])=>`
       <div class="scat">
         <h4>${esc(cat)}</h4>
         ${arr.map(s=>`<button class="sent ${c.sentences.includes(s)?'on':''}" data-s="${esc(s)}"><span class="tick">✔ 已装备</span>${esc(s)}</button>`).join('')}
       </div>`).join('')}
     <div class="note" style="margin-top:14px">✨ <b>好词也带上：</b>${u.words.map(w=>`<span class="badge" style="background:#efe2bf;color:#6a4f17;margin:2px">${esc(w)}</span>`).join('')}</div>
     ${navBtns(u,2,4,c.sentences.length>=need,'进入创作室 ✍️')}
   </div>`;
  function refresh(){
    $('#sCount').textContent=`已装备 ${c.sentences.length} 句金句`;
    if($('#navNext')) $('#navNext').disabled=c.sentences.length<need;
  }
  refresh();
  screen.querySelectorAll('.sent').forEach(b=>b.onclick=()=>{
    const s=b.dataset.s; const i=c.sentences.indexOf(s);
    if(i>=0){ c.sentences.splice(i,1); b.classList.remove('on'); sfx.click(); }
    else{ c.sentences.push(s); b.classList.add('on'); sfx.good(); }
    save(); refresh();
  });
  speak('金句武器库。挑你喜欢的好句子装备起来，至少三句。');
  wireNav(2,4,()=>c.sentences.length>=need);
}

  fieldEls.forEach(t=>{
    t.addEventListener('focus',()=>LAST_FOCUS=t);
    t.addEventListener('input',()=>{ c.fields[t.dataset.fk]=t.value; save(); });
  });
  draft.addEventListener('focus',()=>LAST_FOCUS=draft);
  draft.addEventListener('input',()=>{ c.draft=draft.value; $('#wc').textContent=cnLen(draft.value); save(); });

  $('#stitch').onclick=()=>{
    sfx.good();
    const stitched = u.compose(c.fields);
    let title = caseTitle(u,c);
    const body = stitched.trim() ? `　　${stitched}` : '';
    const text = `${title}\n\n　　${body? stitched.replace(/\n\s*/g,'\n　　') : '（先在上面的填空里写下你的故事，再点这里拼成初稿）'}`;
    draft.value = text; c.draft=text; $('#wc').textContent=cnLen(text); save();
    draft.focus(); toast('🧵 已拼成初稿！现在读一读、改一改，让它更通顺～');
  };
  $('#clearDraft').onclick=()=>{ if(confirm('清空下面的大框？（你上面填的内容不会丢）')){ draft.value='';c.draft='';$('#wc').textContent='0';save(); } };

  screen.querySelectorAll('.jins').forEach(ch=>ch.onclick=()=>{
    const s=ch.dataset.ins;
    const target = (LAST_FOCUS&&document.contains(LAST_FOCUS))?LAST_FOCUS:draft;
    insertAtCursor(target, (target.value&&!/\s$/.test(target.value)?'':'')+s);
    if(target===draft){ c.draft=draft.value; $('#wc').textContent=cnLen(draft.value); }
    else { c.fields[target.dataset.fk]=target.value; }
    save(); sfx.click(); speak(s);
  });
  speak('创作室。把你的故事填进每一个空，再拼成初稿。');
  wireNav(3,5);
}
function insertAtCursor(el,text){
  el.focus();
  const s=el.selectionStart??el.value.length, e=el.selectionEnd??el.value.length;
  el.value = el.value.slice(0,s)+text+el.value.slice(e);
  const pos=s+text.length; el.selectionStart=el.selectionEnd=pos;
}

/* ---- 房间5：结案厅（提交 / 交给侦探长批改） ---- */
function buildPackage(u,c){
  const choiceTxt = /自己想/.test(c.choice) ? (c.choiceCustom||c.choice) : c.choice;
  const lines=[];
  lines.push('【美美的作文 · 待"侦探长"复审】');
  lines.push(`单元：第${u.no}单元 · ${u.type}`);
  lines.push(`题目：《${caseTitle(u,c)}》`);
  lines.push(`方向：${choiceTxt||'（未选）'}`);
  lines.push(`日期：${today()}`);
  lines.push('————————————————————');
  lines.push('■ 我装备的金句：');
  (c.sentences||[]).forEach(s=>lines.push('  · '+s));
  lines.push('————————————————————');
  lines.push('■ 我的作文初稿：');
  lines.push('');
  lines.push((c.draft||'（空）').trim());
  lines.push('');
  lines.push('————————————————————');
  lines.push('【请侦探长按"满分30、只扣3分"的高标准批改】：');
  lines.push('1) 评分（30分制）+ 简短总评；2) 逐处说"这句怎么改更好"（保留孩子原意）；');
  lines.push('3) 给一篇"只扣3分"的优化范文；4) 用上老师方法：审题、选材、详略、五种描写、真情实感、卷面。');
  return lines.join('\n');
}

/* ---- AI 一键批改（结案厅，本地服务在线时可用） ---- */
async function aiGrade(u,c){
  const btn=$('#aiBtn'), box=$('#aiResult');
  if(!btn||btn.disabled) return;
  if(cnLen(c.draft)<40){ toast('初稿太短啦，先回创作室多写一点～'); return; }
  btn.disabled=true; sfx.click();
  box.innerHTML=`<div class="panel" style="text-align:center">
     <div style="font-size:36px">🕵️‍♂️</div>
     <p style="font-weight:700;color:var(--ink);margin:6px 0 2px">侦探长正在逐字批改…</p>
     <p class="hint" style="color:var(--ink2);margin:0">审题 → 放慢镜头 → 数字数 → 写体检（约 20-40 秒，别关页面）</p>
     <div class="bar"><i id="aiBar"></i></div></div>`;
  let p=6; const tk=setInterval(()=>{ p=Math.min(94,p+Math.random()*6); const b=$('#aiBar'); if(b)b.style.width=p+'%'; },650);
  try{
    const r=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({unit_no:u.no, title:caseTitle(u,c), choice:c.choice, draft:c.draft, sentences:c.sentences})});
    const data=await r.json(); clearInterval(tk);
    const b=$('#aiBar'); if(b)b.style.width='100%';
    if(!data.ok){ box.innerHTML=`<div class="note" style="border-color:var(--bad);background:#fdeceb">⚠️ ${esc(data.error||'批改失败，请重试')}</div>`; btn.disabled=false; sfx.bad(); return; }
    sfx.win(); confetti();
    renderAIResult(u,c,data);
  }catch(e){
    clearInterval(tk);
    box.innerHTML=`<div class="note" style="border-color:var(--bad);background:#fdeceb">⚠️ 连不上批改服务。请用《双击启动·AI批改版.bat》打开本游戏再试。<br><span style="color:var(--ink2)">${esc(String(e).slice(0,120))}</span></div>`;
    btn.disabled=false; sfx.bad();
  }
}
function aiMark(m){ return /✓/.test(m)?'<span style="color:var(--ok)">✓</span>':(/✗/.test(m)?'<span style="color:var(--bad)">✗</span>':'<span style="color:var(--brass-d)">△</span>'); }

function saveToGallery(u,c){

/* ===================== 撒花 ===================== */
function confetti(){
  const c=$('#confetti'); c.classList.remove('hidden');
  const ctx=c.getContext('2d'); c.width=innerWidth; c.height=innerHeight;
  const colors=['#e0bd63','#e0843c','#6f7fd6','#cf5a7e','#6bbf8a','#fff0b0'];
  const P=Array.from({length:150},(_,i)=>({x:Math.random()*c.width,y:-20-Math.random()*c.height*.4,
    r:5+Math.random()*7,vy:2+Math.random()*4,vx:-2.5+Math.random()*5,a:Math.random()*6,va:-.2+Math.random()*.4,
    col:colors[i%colors.length]}));
  let f=0;
  (function loop(){ f++; ctx.clearRect(0,0,c.width,c.height);
    P.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.a+=p.va;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.a);ctx.fillStyle=p.col;
      ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*.62);ctx.restore();});
    if(f<240)requestAnimationFrame(loop); else {ctx.clearRect(0,0,c.width,c.height);c.classList.add('hidden');}
  })();
}
